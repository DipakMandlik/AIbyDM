name: Dependency Review

on:
  pull_request:
    branches: [main]
    paths:
      - package.json
      - pnpm-lock.yaml
      - .github/workflows/**

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
